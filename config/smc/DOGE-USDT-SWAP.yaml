# config/smc/ETH-USDT-SWAP.yaml
timeframe: '1H'

# SMC 信号生成参数
strategy:
  ema_period: 140
  lookback: 12
  atr_mult: 1.9
  ob_expiry: 24
  sl_buffer: 1
  entry_buffer: 0.2

# 回测/实盘引擎风控参数
engine:
  initial_capital: 1000.0
  max_risk: 0.09           # ETH 适用 9% 暴利风控
  atr_multiplier: 6.0      # ETH 适用 7.0 追踪
  fee_rate: 0.0005
  time_stop: 120

# 二号引擎引入AI
ai_filter:
  enabled: false
  model_path: "data/models/smc_eth_v1.json"
  threshold: 0.15