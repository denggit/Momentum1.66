# config/smc/ETH-USDT-SWAP.yaml
timeframe: '1H'

# SMC 信号生成参数
strategy:
  ema_period: 60
  lookback: 28
  atr_mult: 1.2
  ob_expiry: 84
  sl_buffer: 1
  entry_buffer: 0.1

# 回测/实盘引擎风控参数
engine:
  initial_capital: 1000.0
  max_risk: 0.02           # ETH 适用 9% 暴利风控
  atr_multiplier: 8      # ETH 适用 7.0 追踪
  fee_rate: 0.0005
  time_stop: 96

# 二号引擎引入AI
ai_filter:
  enabled: false
  model_path: "data/models/smc_eth_v1.json"
  threshold: 0.15