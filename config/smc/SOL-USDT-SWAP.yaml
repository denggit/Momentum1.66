# config/smc/ETH-USDT-SWAP.yaml
timeframe: '1H'

# SMC 信号生成参数
strategy:
  ema_period: 60
  lookback: 28
  atr_mult: 1.2
  ob_expiry: 84
  sl_buffer: 1
  entry_buffer: 0.1

# 回测/实盘引擎风控参数
engine:
  initial_capital: 1000.0
  max_risk: 0.02           # ETH 适用 9% 暴利风控
  atr_multiplier: 8      # ETH 适用 7.0 追踪
  fee_rate: 0.0005
  time_stop: 96

  # 交易执行参数
  leverage: 50
  default_sl_pct: 0.0015  # 备用默认止损百分比
  td_mode: "cross"        # 保证金模式: cross(全仓) / isolated(逐仓)
  min_contracts: 1        # 最小合约张数

  # 风控参数
  max_position_size_usdt: 10000  # 单笔最大仓位(USD)
  daily_loss_limit_pct: 0.1      # 每日最大亏损百分比

# 二号引擎引入AI
ai_filter:
  enabled: false
  model_path: "data/models/smc_eth_v1.json"
  threshold: 0.15