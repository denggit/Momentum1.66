# config/orderflow/DOGE-USDT-SWAP.yaml
symbol: "DOGE-USDT-SWAP"

# 合约面值配置（从trader.py中提取）
contract:
  contract_size: 100.0  # DOGE合约面值

# 交易参数（从Engine3Commander中提取）
trading:
  leverage: 50        # 第43行：leverage=50
  risk_pct: 0.8       # 第43行：risk_pct=0.8
  email_cooldown: 600 # 第49行：_email_cooldown=600
  scan_interval: 0.1  # 第63行：情报扫描间隔100ms

# 订单流核心参数（从orderflow.py中提取）
orderflow:
  # 状态机参数
  armed_threshold_usdt: 5_000_000  # 第108行：触发上膛的砸盘量
  fire_cooldown_sec: 300           # 第108行：开火冷却时间

  # 智能空间拦截参数
  recent_stop_loss_window: 900     # 第123行：近期止损判定时间
  rebound_threshold: 1.005         # 第125行：反弹超过0.5%判定

  # 耐心潜伏参数
  patience_latency: 3600           # 第142行：耐心潜伏时间1小时
  price_silence_threshold: 0.5     # 第143行：价格静默漂移阈值0.5%

  # 冰山吸收条件
  price_drop_threshold: 0.06       # 第174行：价格跌幅阈值0.06%
  dump_anomaly_threshold: 1.5      # 第173行：砸盘异常度阈值1.5倍
  resistance_anomaly_threshold: 4.0 # 第175行：阻力异常度阈值4.0倍

  # V型反转条件
  v_reversal_dump_threshold: 1.2   # 第190行：V反砸盘异常度阈值1.2倍
  v_reversal_counter_threshold: 500_000 # 第191行：V反反击量阈值50万美元
  v_reversal_rebound_ratio: 0.08   # 第192行：V反反弹比例阈值8%
  v_reversal_min_rebound: 0.05     # 第193行：V反最小反弹幅度0.05%
  v_reversal_max_rebound: 0.25     # 第193行：V反最大反弹幅度0.25%

  # 宽口径汇报条件
  broad_report_threshold: 150_000  # 第220行：宽口径汇报阈值
  broad_min_bounce: 0.03           # 第220行：宽口径最小反弹0.03%
  broad_max_bounce: 0.30           # 第220行：宽口径最大反弹0.30%

  # 隐形墙探测参数（detect_absorption_wall方法）
  wall_threshold_usdt: 8_000_000   # 第285行：隐形墙砸盘阈值800万美金
  wall_max_drop_pct: 0.08          # 第287行：隐形墙最大下潜0.08%

  # 空头挤压探测参数（detect_short_squeeze方法）
  squeeze_buy_threshold: 5_000_000 # 第304行：空头挤压买入阈值500万美金
  squeeze_price_change: 0.08       # 第304行：空头挤压价格变化0.08%

# 执行参数（从执行逻辑中提取）
execution:
  tp1_pct: 0.004    # 第一止盈位0.4%
  tp2_pct: 0.012    # 第二止盈位1.2%
  sl_pct: 0.0015    # 初始止损0.15%

  # 防阴跌拦截
  anti_slide_threshold: 4_000_000  # 第104行：防阴跌拦截阈值4百万美元
  tp1_split_ratio: 0.5  # TP1仓位分割比例 (30%去TP1，70%去TP2)
  tp1_min_size: 1  # TP1最小张数

# SMC验证参数（可选）
smc_validation:
  enabled: true
  timeframes: [ "5m", "15m", "1H" ]