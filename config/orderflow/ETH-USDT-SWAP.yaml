# config/orderflow/ETH-USDT-SWAP.yaml
# 🌟 高频剥头皮模式 (Pure Scalper) 🌟
symbol: "ETH-USDT-SWAP"

contract:
  contract_size: 0.1

trading:
  leverage: 50
  risk_pct: 0.4       # 🌟 降低单次风险：高频交易必须降低单笔下注，建议只用30%可用余额
  email_cooldown: 60
  scan_interval: 0.1

orderflow:
  # 🔫 极速状态机参数
  armed_threshold_usdt: 2_000_000  # 🌟 门槛腰斩：只要砸 200 万就上膛，增加交易频率
  fire_cooldown_sec: 30            # 🌟 极速冷却：打完一枪30秒后只要有行情继续打！
  recent_stop_loss_window: 120     # 🌟 扫损记忆缩短至 2 分钟
  rebound_threshold: 1.002         # 🌟 只要反弹 0.2% 就解除死锁

  # ⏳ 耐心参数 (高频不等人)
  patience_latency: 60             # 🌟 坑底只等 1 分钟，没动静直接退膛
  price_silence_threshold: 0.25    # 反弹超过 0.25% 不追高

  # 🧱 冰山吸收条件
  price_drop_threshold: 0.08
  safe_drop_min: 0.005
  dump_anomaly_threshold: 0      # 门槛降低
  resistance_anomaly_threshold: 0

  # 🔥 V型反转条件
  v_reversal_dump_threshold: 0
  v_reversal_counter_threshold: 200_000 # 🌟 反击资金门槛降低至 20 万美金
  v_reversal_rebound_ratio: 0.05   # 反包比例降至 5%
  v_reversal_min_rebound: 0.03     # 针尖抬头 0.03% 就开火
  v_reversal_max_rebound: 0.20

  # 🧪 宽口径汇报条件
  broad_report_threshold: 100_000
  broad_min_bounce: 0.02
  broad_max_bounce: 0.30

  # 🧱 物理掩体探测
  wall_threshold_usdt: 4_000_000
  wall_max_drop_pct: 0.10
  squeeze_buy_threshold: 3_000_000
  squeeze_price_change: 0.05

execution:
  # 🎯 极速止盈止损
  tp1_pct: 0.002    # 🌟 TP1: 0.2% (高频抢钱，打到立刻平 30%)
  tp2_pct: 0.006    # 🌟 TP2: 0.6% (尾仓格局)
  sl_pct: 0.0015    # 🌟 止损: 0.15% (保持极致防守)

  anti_slide_threshold: 1_500_000  # 连跌熔断门槛降低

  # 🛡️ 生命周期管理 (极速推保本)
  breakeven_pct: 0.001             # 🌟 保本线：上移 0.1% 防手续费
  mech_step1_trigger_pct: 0.003    # 🌟 阶段1触发：涨到 0.3% 就开始阶梯防守
  mech_step1_sl_pct: 0.0015
  wall_sl_offset_pct: 0.0005
  moonbag_warning_ratio: 0.60
  fallback_threshold_pct: 0.0015
  min_move_pct: 0.001
  moon_strong_candle_pct: 0.002
  moon_sl_offset_pct: 0.0005

  # 监控频率 (高频必须极速)
  stage0_interval: 0.5  # 🌟 半秒查一次 TP1 是否成交
  stage1_interval: 1.0
  stage2_interval: 1.0
  stage3_interval: 2.0

smc_validation:
  enabled: false   # 🌟🌟🌟 核心：关闭 SMC 雷达！无视宏观，只吃纯微观盘口！
  timeframes: ["5m"]