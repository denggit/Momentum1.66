# config/triple_a/ETH-USDT-SWAP-RESEARCH.yaml
# 科考船研究专用配置文件 - 更宽松的参数，用于收集更多数据
symbol: "ETH-USDT-SWAP"

# 合约面值配置
contract:
  contract_size: 0.1  # ETH合约面值

# 交易参数
trading:
  leverage: 20              # 剥头皮使用较低杠杆
  risk_pct: 0.05            # 单笔风险5%（早期快速积累资本）
  max_daily_trades: 1000    # 每日最大交易次数（几乎无限制）

# Triple-A检测参数 - 科考船宽松版
triple_a:
  # Absorption（吸收）检测参数 - 科考船严格阈值
  absorption_price_threshold: 0.005      # 价格阈值0.5%（原0.3%）
  absorption_volume_ratio: 2.0           # 成交量比率2.0x（原1.2x）
  absorption_window_seconds: 30          # 吸收检测窗口30秒
  absorption_score_threshold: 0.7        # 吸收置信度阈值0.7（科考船：有意义信号）

  # 数据聚合参数
  aggregation_window_seconds: 5          # tick数据聚合窗口5秒（减少噪声）

  # Accumulation（累积）检测参数 - 科考船严格阈值
  accumulation_width_pct: 0.012          # 累积区间宽度1.2%（原0.8%）
  accumulation_min_ticks: 30             # 最小tick数30
  accumulation_window_seconds: 120       # 累积检测窗口120秒
  accumulation_score_threshold: 0.65     # 累积置信度阈值0.65（科考船：有意义信号）

  # Aggression（侵略）检测参数 - 科考船严格阈值
  aggression_volume_spike: 2.5           # 成交量爆发倍数2.5x（原1.5x）
  aggression_breakout_pct: 0.0010        # 突破阈值0.1%（原0.05%）
  aggression_score_threshold: 0.75       # 侵略置信度阈值0.75（科考船：有意义信号）

  # Failed Auction（失败拍卖）检测参数 - 科考船严格阈值
  failed_auction:
    enabled: true
    window_seconds: 300
    detection_threshold: 0.8              # 失败拍卖检测阈值0.8（原0.55）
    volume_confirmation_multiplier: 2.0   # 成交量确认倍数2.0（原1.3）

  # Fabio验证参数 - 科考船宽松版
  validation:
    # 价值区间验证参数
    value_area_balance_range_pct: 0.03     # 平衡区间范围 ±3%（原±2%）
    value_area_ratio: 0.6                  # 价值区间成交量占比 60%（原70%）
    min_value_area_strength: 40.0          # 最小价值区间强度分数40（原60）
    value_area_validation_enabled: true    # 启用价值区间验证

    # 订单流验证参数
    orderflow_cvd_threshold: 0.5           # CVD方向验证阈值0.5（原0.7）
    orderflow_large_order_ratio: 1.5       # 大单比率阈值1.5x（原2.0x）
    orderflow_validation_enabled: true     # 启用订单流验证

    # 多时间框架验证参数
    multi_tf_alignment_enabled: true       # 启用多时间框架对齐验证
    multi_tf_timeframes: ["5m", "15m", "1H"]  # 多时间框架列表

    # 市场环境参数
    market_volatility_threshold_high: 2.5  # 高波动率阈值 (ATR倍数)（原2.0）
    market_volatility_threshold_low: 0.3   # 低波动率阈值 (ATR倍数)（原0.5）
    adaptive_validation_enabled: true      # 启用适应性验证

# 执行参数
execution:
  entry_slippage: 0.0010    # 入场滑点容忍0.1%（原0.05%）
  initial_sl_pct: 0.015     # 最大允许总风险1.5%（原1%）
  min_reward_ratio: 2.0     # 最小风险回报比2.0（原2.5）

# 风险管理参数 - 科考船宽松版
risk_management:
  max_position_limit: 100
  min_trade_unit: 1
  high_volatility_threshold: 2.5          # 高波动率阈值（ATR倍数）（原2.0）
  max_leverage: 20
  margin_safety_factor: 0.7               # 保证金安全系数70%（原80%）

# 科考船研究参数
research:
  mode: "simulation"               # collection, simulation, parameter_experiment
  output_dir: "data/triple_a_research"

  # 科考船专用：更频繁的交易用于数据收集
  simulation:
    initial_balance: 100.0          # 模拟账户100U
    risk_per_trade: 0.03           # 单笔风险3%（比实盘5%更低，允许更多交易）
    commission_rate: 0.001         # 总手续费0.1%

  # 科考船参数实验 - 测试不同宽松程度
  parameter_experiments:
    # 测试不同Aggression阈值
    - param: "aggression_score_threshold"
      values: [0.5, 0.55, 0.6, 0.65, 0.7]
      metric: "signal_count"

    # 测试不同成交量倍数
    - param: "aggression_volume_spike"
      values: [1.5, 2.0, 2.5, 3.0]
      metric: "signal_quality"

    # 测试不同验证严格度
    - param: "orderflow_cvd_threshold"
      values: [0.4, 0.5, 0.6, 0.7]
      metric: "validation_pass_rate"